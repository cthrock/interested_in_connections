# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: How non-cs majors are interested in connections to computer science
email: cthrock@unc.edu
description: >- # this means to ignore newlines until "baseurl:"
  My site will explore the connections between non-cs majors and computer science, 
  and how they are interested in learning more about the field. I will be using data 
  from surveys and interviews to analyze the reasons behind this interest and how it 
  can be fostered in educational settings.
baseurl: "/interested_in_connections" # the subpath of your site, e.g. /blog
url: "cthrock.github.io" # the base hostname & protocol for your site, e.g. http://example.com
twitter_username: jekyllrb
github_username:  jekyll

# Build settings
# Build settings
remote_theme: "jekyll/minima@1e8a445"

plugins:
  - jekyll-remote-theme
